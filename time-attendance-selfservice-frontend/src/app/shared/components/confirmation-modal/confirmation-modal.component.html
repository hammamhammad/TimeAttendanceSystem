@if (show) {
  <div
    class="erp-confirm-overlay"
    (click)="onBackdropClick($event)"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="titleId">
    <div class="erp-confirm-box" role="document" (click)="$event.stopPropagation()">
      <div class="erp-confirm-icon-wrap">
        <div class="erp-confirm-icon" [ngClass]="getIconWrapClass()">
          <i [class]="getIconClass()"></i>
        </div>
      </div>

      <div class="erp-confirm-content">
        <h3 [id]="titleId" class="erp-confirm-title">{{ title }}</h3>
        <p class="erp-confirm-message">{{ message }}</p>
        @if (details) {
          <div class="erp-confirm-details">
            <strong>{{ details }}</strong>
          </div>
        }
      </div>

      <div class="erp-confirm-actions">
        <button
          type="button"
          class="btn btn-secondary btn-sm erp-confirm-btn"
          (click)="onCancel()"
          [disabled]="loading">
          {{ cancelText }}
        </button>
        <button
          type="button"
          [class]="getButtonClass()"
          (click)="onConfirm()"
          [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          } @else if (confirmIcon) {
            <i [class]="confirmIcon" class="me-1"></i>
          }
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
}
