<nav class="sidenav"
     [class.collapsed]="collapsed()"
     [class.show]="show()"
     [attr.aria-expanded]="!collapsed()">

  <div class="sidenav-header p-3">
    @if (!collapsed()) {
      <div class="d-flex align-items-center">
        <img src="assets/images/logo.svg" alt="ClockN" class="sidenav-logo me-2">
      </div>
    } @else {
      <img src="assets/images/logo.svg" alt="ClockN" class="sidenav-logo-collapsed">
    }
  </div>

  <ul class="nav flex-column mt-2">
    @for (item of menuItems(); track item.path || item.titleKey) {
      @if (item.isSeparator) {
        <li class="nav-separator">
          @if (!collapsed()) {
            <hr class="my-2">
            <span class="separator-label px-3">{{ t(item.titleKey) }}</span>
          } @else {
            <hr class="my-2">
          }
        </li>
      } @else {
        <li class="nav-item">
          <a class="nav-link d-flex align-items-center"
             [routerLink]="item.path"
             routerLinkActive="active"
             [title]="collapsed() ? t(item.titleKey) : ''">
            <i class="{{ item.icon }} nav-icon"></i>
            @if (!collapsed()) {
              <span class="text-truncate">{{ t(item.titleKey) }}</span>
            }
          </a>
        </li>
      }
    }
  </ul>
</nav>
