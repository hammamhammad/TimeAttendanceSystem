<!-- Page Header -->
<app-page-header [title]="i18n.t('portal.surveys.title')">
  <div header-actions>
    <button
      class="btn btn-outline-primary btn-sm"
      (click)="refresh()"
      [disabled]="loading()"
      type="button">
      <i class="bi bi-arrow-clockwise" [class.spin]="loading()"></i>
      {{ i18n.t('common.refresh') }}
    </button>
  </div>
</app-page-header>

<!-- Loading State -->
@if (loading() && surveys().length === 0) {
  <app-loading-spinner [message]="i18n.t('common.loading')"></app-loading-spinner>
}

<!-- Error State -->
@if (error() && surveys().length === 0) {
  <div class="alert alert-danger" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="refresh()" type="button">{{ i18n.t('common.retry') }}</button>
  </div>
}

<!-- Empty State -->
@if (!loading() && surveys().length === 0 && !error()) {
  <app-empty-state
    icon="bi bi-clipboard2-check"
    [title]="i18n.t('portal.surveys.no_surveys')">
  </app-empty-state>
}

<!-- Data Table -->
@if (surveys().length > 0) {
  <div class="card">
    <div class="card-body">
      <app-data-table
        [data]="tableData()"
        [columns]="columns"
        [actions]="tableActions()"
        [loading]="loading()"
        [paginated]="true"
        [pageSize]="10"
        (actionClick)="onAction($event)">
      </app-data-table>
    </div>
  </div>

  <!-- Info Card -->
  <div class="card mt-3">
    <div class="card-body">
      <div class="d-flex align-items-start">
        <i class="bi bi-info-circle text-info me-3 mt-1" style="font-size: 1.5rem;"></i>
        <div>
          <h6 class="mb-2">{{ i18n.t('portal.surveys.info_title') }}</h6>
          <p class="text-muted mb-0 small">{{ i18n.t('portal.surveys.info_text') }}</p>
        </div>
      </div>
    </div>
  </div>
}
