# Native Splash Screen Configuration
# Run: dart run flutter_native_splash:create

flutter_native_splash:
  # White background with ClockN logo centered
  color: "#FFFFFF"
  image: assets/images/logo.png

  # Dark mode variant
  color_dark: "#1A1A2E"
  image_dark: assets/images/logo.png

  # Android 12+ splash screen configuration
  android_12:
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"
    image: assets/images/logo.png

    # Dark mode for Android 12+
    color_dark: "#1A1A2E"
    icon_background_color_dark: "#1A1A2E"
    image_dark: assets/images/logo.png

  # Platform-specific settings
  android: true
  ios: true
  web: true

  # Web-specific configuration
  web_image_mode: center

  # Fullscreen mode
  fullscreen: true

  # iOS content mode
  ios_content_mode: center

  # Android gravity
  android_gravity: center
