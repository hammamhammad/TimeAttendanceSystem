<div class="file-upload-wrapper">
  @if (currentFileUrl && !uploadedFile()) {
    <div class="current-file d-flex align-items-center gap-2 mb-2">
      <i class="fa-solid fa-paperclip"></i>
      <a [href]="getFullFileUrl(currentFileUrl)" target="_blank" class="text-primary text-truncate">{{ currentFileName || i18n.t('files.view_file') }}</a>
      <button type="button" class="btn btn-sm btn-outline-danger ms-auto" (click)="removeFile()" [title]="i18n.t('files.remove')">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  }

  @if (uploadedFile()) {
    <div class="uploaded-file d-flex align-items-center gap-2 mb-2">
      <i class="fa-solid fa-check-circle text-success"></i>
      <span class="text-truncate">{{ uploadedFile()!.fileName }}</span>
      <button type="button" class="btn btn-sm btn-outline-danger ms-auto" (click)="removeFile()" [title]="i18n.t('files.remove')">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  }

  @if (!uploadedFile()) {
    <div class="upload-area">
      <label class="app-dropzone d-block"
             [class.is-invalid]="error()">
        @if (uploading()) {
          <i class="fa-solid fa-spinner fa-spin app-dropzone__icon"></i>
          <div class="app-dropzone__title">{{ i18n.t('files.uploading') }}</div>
        } @else {
          <i class="fa-solid fa-cloud-upload-alt app-dropzone__icon"></i>
          <div class="app-dropzone__title">{{ displayLabel }}</div>
          <div class="app-dropzone__hint">{{ accept }} &middot; {{ maxSizeMB }} MB</div>
        }
        <input type="file"
               class="d-none"
               [accept]="accept"
               (change)="onFileSelected($event)"
               [disabled]="uploading()">
      </label>
      @if (error()) {
        <div class="form-error">
          <i class="fa-solid fa-exclamation-circle"></i>
          <span>{{ error() }}</span>
        </div>
      }
    </div>
  }
</div>
