<div class="app-view-page app-modern-view">
  <app-form-header
    mode="view"
    [title]="i18n.t('counseling_records.view')"
    moduleName="counseling"
    moduleRoute="employee-relations/counseling"
    [entityId]="record()?.id"
    [loading]="loading()"
    [actions]="headerActions()">
  </app-form-header>

  @if (loading()) {
    <div class="text-center py-5">
      <app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true"></app-loading-spinner>
    </div>
  }

  @if (record() && !loading()) {
    <app-section-card [title]="i18n.t('counseling_records.session_info')" icon="fas fa-comments" headerClass="bg-light" class="mb-4">
      <app-definition-list [items]="basicInfoItems()" [labelWidth]="'4'" [valueWidth]="'8'"></app-definition-list>
    </app-section-card>

    <app-section-card [title]="i18n.t('counseling_records.follow_up_info')" icon="fas fa-calendar-check" headerClass="bg-light" class="mb-4">
      <app-definition-list [items]="followUpInfoItems()" [labelWidth]="'4'" [valueWidth]="'8'"></app-definition-list>
    </app-section-card>

    <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light" class="mb-4">
      <app-audit-history [entityName]="'CounselingRecord'" [entityId]="record()?.id" />
    </app-section-card>
  }
</div>
