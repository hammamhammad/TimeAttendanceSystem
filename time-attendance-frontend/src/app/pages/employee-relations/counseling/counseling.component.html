<div class="app-list-page">
  <app-page-header [title]="i18n.t('counseling_records.title')" />

  <app-unified-filter
    [searchPlaceholder]="i18n.t('counseling_records.search')"
    [showAddButton]="true"
    [addButtonText]="i18n.t('counseling_records.create')"
    [showRefreshButton]="true"
    [refreshButtonText]="i18n.t('common.refresh')"
    [refreshing]="loading()"
    (searchChange)="onSearchChange($event)"
    (add)="navigateToCreate()"
    (refresh)="loadData()">
  </app-unified-filter>

  <app-data-table
    [data]="items()"
    [columns]="tableColumns"
    [actions]="tableActions"
    [currentPage]="currentPage()"
    [totalItems]="totalCount()"
    [pageSize]="pageSize()"
    [loading]="loading"
    [emptyTitle]="i18n.t('counseling_records.no_data')"
    [emptyMessage]="i18n.t('counseling_records.no_data')"
    [showPagination]="true"
    (actionClick)="onActionClick($event)"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)">
    <ng-template #cellTemplate let-item let-column="column">
      @if (column.key === 'status') {
        <app-status-badge
          [status]="getFollowUpVariant(item)"
          [label]="getFollowUpLabel(item)">
        </app-status-badge>
      } @else if (column.key === 'followUpRequired') {
        <app-status-badge
          [status]="item.followUpRequired ? 'warning' : 'secondary'"
          [label]="item.followUpRequired ? i18n.t('common.yes') : i18n.t('common.no')">
        </app-status-badge>
      } @else if (column.key === 'counselingType') {
        {{ getTypeLabel(item.counselingType) }}
      } @else if (column.key === 'sessionDate') {
        {{ formatDate(item.sessionDate) }}
      } @else {
        {{ item[column.key] || '-' }}
      }
    </ng-template>
  </app-data-table>
</div>
