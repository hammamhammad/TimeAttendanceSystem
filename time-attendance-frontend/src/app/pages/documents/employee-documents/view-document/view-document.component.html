<div class="container-fluid app-modern-view">
  <app-form-header [title]="i18n.t('employee_documents.view')" moduleName="employee-documents" moduleRoute="documents/employee-documents" [loading]="loading()" />

  @if (loading()) {
    <app-loading-spinner [message]="i18n.t('common.loading')" [centered]="true" />
  }
  @if (error()) {
    <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div>
  }
  @if (document() && !loading()) {
    <div class="row">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">{{ document()?.title }}</h5>
            <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
          </div>
          <div class="card-body">
            <app-definition-list [items]="detailItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">{{ i18n.t('common.actions') }}</h5></div>
          <div class="card-body d-grid gap-2">
            @if (document()?.status === 'PendingVerification') {
              <button class="btn btn-success" (click)="verifyDocument()" [disabled]="processing()">
                <i class="fas fa-check-circle me-1"></i>{{ i18n.t('employee_documents.verify') }}
              </button>
            }
            @if (document()?.fileUrl) {
              <a [href]="document()?.fileUrl" target="_blank" class="btn btn-outline-primary">
                <i class="fas fa-download me-1"></i>{{ i18n.t('common.download') }}
              </a>
            }
          </div>
        </div>
      </div>
    </div>

    <!-- Audit History -->
    <div class="row mt-3">
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'EmployeeDocument'" [entityId]="document()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>
