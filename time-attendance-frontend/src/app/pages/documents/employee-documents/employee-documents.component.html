<div class="app-list-page">
  <app-page-header [title]="i18n.t('employee_documents.title')" />
  <app-unified-filter [searchPlaceholder]="i18n.t('employee_documents.search')" [showRefreshButton]="true"
    [refreshing]="loading()" [showAddButton]="true" [addButtonText]="i18n.t('employee_documents.create')"
    (searchChange)="onSearchChange($event)" (refresh)="onRefreshData()" (add)="navigateToCreate()" />

  <app-data-table [data]="data()" [columns]="columns" [actions]="tableActions()" [currentPage]="currentPage()"
    [totalPages]="totalPages()" [totalItems]="totalCount()" [pageSize]="pageSize()" [loading]="loading"
    [emptyTitle]="i18n.t('employee_documents.no_data')" [showPagination]="true"
    (actionClick)="onActionClick($event)" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
    <ng-template #cellTemplate let-item let-column="column">
      @if (column.key === 'status') {
        <span class="badge" [class.bg-success]="item.status === 'Verified'" [class.bg-warning]="item.status === 'PendingVerification'"
          [class.bg-danger]="item.status === 'Expired'" [class.bg-secondary]="item.status === 'Active'">
          {{ i18n.t('employee_documents.status_' + item.status) }}
        </span>
      } @else if (column.key === 'expiryDate') {
        {{ formatDate(item.expiryDate) }}
      } @else {
        {{ item[column.key] ?? '-' }}
      }
    </ng-template>
  </app-data-table>
</div>
