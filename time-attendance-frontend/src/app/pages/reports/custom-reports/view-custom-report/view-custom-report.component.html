<div class="app-modern-view">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-secondary me-3" (click)="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h4 class="mb-0">{{ i18n.t('customReports.view') }}</h4>
    </div>
    @if (report()) {
      <button class="btn btn-primary" (click)="goToEdit()">
        <i class="fa-solid fa-edit me-1"></i> {{ i18n.t('common.edit') }}
      </button>
    }
  </div>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else if (report()) {
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="mb-0">{{ i18n.t('common.basic_info') }}</h5>
      </div>
      <div class="card-body">
        <app-definition-list [items]="basicInfoItems()" labelWidth="4" valueWidth="8" />
      </div>
    </div>

    @if (schedules().length > 0) {
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">{{ i18n.t('customReports.schedules') }}</h5>
        </div>
        <div class="card-body">
          <app-data-table
            [columns]="scheduleColumns()"
            [data]="schedules()"
            [loading]="false"
            [showPagination]="false" />
        </div>
      </div>
    }
  }
</div>
