@if (loading()) {
  <app-loading-spinner />
} @else if (settings(); as s) {
  <div class="app-modern-form">
    <app-form-section [title]="t('tenant_configuration.attendance.check_in_methods')" icon="fa-solid fa-fingerprint" variant="modern">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enableBiometric"
                   [ngModel]="s.enableBiometricAttendance" (ngModelChange)="s.enableBiometricAttendance = $event">
            <label class="form-check-label" for="enableBiometric">{{ t('tenant_configuration.attendance.biometric') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enableManual"
                   [ngModel]="s.enableManualAttendance" (ngModelChange)="s.enableManualAttendance = $event">
            <label class="form-check-label" for="enableManual">{{ t('tenant_configuration.attendance.manual') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enableGps"
                   [ngModel]="s.enableGpsAttendance" (ngModelChange)="s.enableGpsAttendance = $event">
            <label class="form-check-label" for="enableGps">{{ t('tenant_configuration.attendance.gps') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enableNfc"
                   [ngModel]="s.enableNfcAttendance" (ngModelChange)="s.enableNfcAttendance = $event">
            <label class="form-check-label" for="enableNfc">{{ t('tenant_configuration.attendance.nfc') }}</label>
          </div>
        </div>
      </div>
    </app-form-section>

    <app-form-section [title]="t('tenant_configuration.attendance.grace_periods')" icon="fa-solid fa-hourglass-half" variant="modern">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input type="number" class="form-control" id="lateGrace" placeholder="15"
                   [ngModel]="s.lateGracePeriodMinutes" (ngModelChange)="s.lateGracePeriodMinutes = $event">
            <label for="lateGrace">{{ t('tenant_configuration.attendance.late_grace') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="number" class="form-control" id="earlyLeaveGrace" placeholder="15"
                   [ngModel]="s.earlyLeaveGracePeriodMinutes" (ngModelChange)="s.earlyLeaveGracePeriodMinutes = $event">
            <label for="earlyLeaveGrace">{{ t('tenant_configuration.attendance.early_leave_grace') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="number" class="form-control" id="minHours" placeholder="4"
                   [ngModel]="s.minimumWorkingHoursForPresent" (ngModelChange)="s.minimumWorkingHoursForPresent = $event">
            <label for="minHours">{{ t('tenant_configuration.attendance.min_hours_present') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check form-switch mt-3">
            <input class="form-check-input" type="checkbox" id="trackBreak"
                   [ngModel]="s.trackBreakTime" (ngModelChange)="s.trackBreakTime = $event">
            <label class="form-check-label" for="trackBreak">{{ t('tenant_configuration.attendance.track_break') }}</label>
          </div>
        </div>
      </div>
    </app-form-section>

    <!-- Phase 6 (v14.6): removed the auto-checkout section. Per-shift configuration
         (Shift.IsAutoCheckOut + ShiftPeriod.EndTime + grace period) is the single
         source of truth; ShiftDrivenAutoCheckOutJob runs hourly. Company-wide
         toggle/time were legacy Phase 0 settings and are gone from the schema. -->

    <div class="app-form-actions">
      <button class="btn btn-primary" (click)="save()" [disabled]="saving()">
        @if (saving()) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        <i class="fa-solid fa-save me-1"></i>
        {{ t('common.save') }}
      </button>
    </div>
  </div>
}
