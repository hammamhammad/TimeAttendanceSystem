<div class="app-list-page">
  <app-page-header [title]="i18n.t('expense_claims.title')" />
  <app-unified-filter [searchPlaceholder]="i18n.t('expense_claims.search')" [showRefreshButton]="true" [refreshing]="loading()"
    [showAddButton]="true" [addButtonText]="i18n.t('expense_claims.create')" (add)="navigateToCreate()"
    (searchChange)="onSearchChange($event)" (refresh)="onRefreshData()" />

  <app-data-table [data]="data()" [columns]="columns" [actions]="tableActions()" [currentPage]="currentPage()"
    [totalPages]="totalPages()" [totalItems]="totalCount()" [pageSize]="pageSize()" [loading]="loading"
    [emptyTitle]="i18n.t('expense_claims.no_data')" [showPagination]="true"
    (actionClick)="onActionClick($event)" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
    <ng-template #cellTemplate let-item let-column="column">
      @if (column.key === 'status') {
        <span class="badge" [class.bg-secondary]="item.status === 'Draft'" [class.bg-primary]="item.status === 'Submitted'"
          [class.bg-info]="item.status === 'UnderReview'" [class.bg-success]="item.status === 'Approved' || item.status === 'Reimbursed'"
          [class.bg-danger]="item.status === 'Rejected'" [class.bg-warning]="item.status === 'Cancelled'">
          {{ i18n.t('expense_claims.status_' + item.status) }}
        </span>
      } @else if (column.key === 'totalAmount') {
        {{ item.totalAmount.toFixed(2) }}
      } @else {
        {{ item[column.key] ?? '-' }}
      }
    </ng-template>
  </app-data-table>
</div>
