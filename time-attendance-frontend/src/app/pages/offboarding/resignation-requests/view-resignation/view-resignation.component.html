<div class="app-view-page app-modern-view">
  <app-form-header
    mode="view"
    [title]="i18n.t('offboarding.resignations.view_details')"
    moduleName="offboarding.resignations"
    moduleRoute="offboarding/resignations"
    [entityId]="resignation()?.id"
    [loading]="loading()"
    [actions]="headerActions()">
  </app-form-header>

  @if (loading()) {
    <div class="text-center py-5">
      <app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true"></app-loading-spinner>
    </div>
  }

  @if (resignation() && !loading()) {
    <app-section-card [title]="i18n.t('offboarding.resignations.details')" icon="fas fa-file-signature" headerClass="bg-light" class="mb-4">
      <app-definition-list [items]="basicInfoItems()" [labelWidth]="'4'" [valueWidth]="'8'"></app-definition-list>
    </app-section-card>

    @if (approvalInfoItems().length > 0) {
      <app-section-card [title]="i18n.t('common.approval_info')" icon="fas fa-clipboard-check" headerClass="bg-light" class="mb-4">
        <app-definition-list [items]="approvalInfoItems()" [labelWidth]="'4'" [valueWidth]="'8'"></app-definition-list>
      </app-section-card>
    }

    <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light" class="mb-4">
      <app-audit-history [entityName]="'ResignationRequest'" [entityId]="resignation()?.id" />
    </app-section-card>
  }
</div>
