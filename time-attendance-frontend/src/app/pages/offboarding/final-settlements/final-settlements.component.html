<div class="final-settlements-page">
  <app-page-header [title]="i18n.t('offboarding.final_settlements.title')" />
  <app-unified-filter
    [showAddButton]="false"
    [showRefreshButton]="true"
    [refreshButtonText]="i18n.t('common.refresh')"
    [refreshing]="loading()"
    (refresh)="onRefreshData()">
  </app-unified-filter>
  <app-data-table
    [data]="displayData()"
    [columns]="tableColumns"
    [actions]="tableActions()"
    [loading]="loading"
    [totalItems]="totalCount()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[10, 25, 50]"
    [emptyTitle]="i18n.t('offboarding.final_settlements.no_records_title')"
    [emptyMessage]="i18n.t('offboarding.final_settlements.no_records')"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (actionClick)="onTableAction($event)" />
</div>
