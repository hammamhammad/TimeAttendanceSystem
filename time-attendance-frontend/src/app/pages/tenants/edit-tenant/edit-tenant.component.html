<div class="container-fluid app-modern-form">
  <!-- Header -->
  <app-form-header
    mode="edit"
    [title]="'Edit Tenant'"
    moduleName="tenants"
    moduleRoute="tenants"
    [entityId]="tenantId"
    [loading]="submitting()">
  </app-form-header>

  @if (loading()) {
    <div class="d-flex justify-content-center py-5">
      <app-loading-spinner
        [message]="'Loading tenant...'"
        [centered]="true">
      </app-loading-spinner>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Basic Information -->
      <app-form-section [title]="'Basic Information'" variant="modern">
        <div class="row g-3">
          <!-- Name -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="name"
                formControlName="name"
                [class.is-invalid]="hasError('name')"
                placeholder="Company Name">
              <label for="name">
                Company Name
                <span class="text-danger">*</span>
              </label>
            </div>
            @if (hasError('name')) {
              <div class="invalid-feedback d-block">{{ getError('name') }}</div>
            }
          </div>

          <!-- Name (Arabic) -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="nameAr"
                formControlName="nameAr"
                [class.is-invalid]="hasError('nameAr')"
                placeholder="Company Name (Arabic)">
              <label for="nameAr">Company Name (Arabic)</label>
            </div>
          </div>

          <!-- Company Logo -->
          <div class="col-md-6">
            <div class="app-modern-field">
              <label class="app-modern-label">Company Logo</label>
              <app-file-upload
                [accept]="'.jpg,.jpeg,.png,.svg'"
                [label]="'Upload company logo'"
                [maxSizeMB]="5"
                [currentFileUrl]="form.get('logoUrl')?.value"
                (fileUploaded)="onLogoUploaded($event)"
                (fileRemoved)="form.patchValue({logoUrl: ''})">
              </app-file-upload>
            </div>
          </div>
        </div>
      </app-form-section>

      <!-- Company Information -->
      <app-form-section [title]="'Company Information'" variant="modern">
        <div class="row g-3">
          <!-- Registration Number -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="companyRegistrationNumber"
                formControlName="companyRegistrationNumber"
                placeholder="Registration Number">
              <label for="companyRegistrationNumber">Registration Number</label>
            </div>
          </div>

          <!-- Tax ID -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="taxIdentificationNumber"
                formControlName="taxIdentificationNumber"
                placeholder="Tax Identification Number">
              <label for="taxIdentificationNumber">Tax Identification Number</label>
            </div>
          </div>

          <!-- Industry -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="industry"
                formControlName="industry"
                placeholder="Industry">
              <label for="industry">Industry</label>
            </div>
          </div>

          <!-- Country -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="country"
                formControlName="country"
                placeholder="Country">
              <label for="country">Country</label>
            </div>
          </div>

          <!-- City -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="city"
                formControlName="city"
                placeholder="City">
              <label for="city">City</label>
            </div>
          </div>

          <!-- Address -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="address"
                formControlName="address"
                placeholder="Address">
              <label for="address">Address</label>
            </div>
          </div>

          <!-- Phone -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="tel"
                class="form-control"
                id="phone"
                formControlName="phone"
                placeholder="Phone">
              <label for="phone">Phone</label>
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                [class.is-invalid]="hasError('email')"
                placeholder="Email">
              <label for="email">Email</label>
            </div>
            @if (hasError('email')) {
              <div class="invalid-feedback d-block">{{ getError('email') }}</div>
            }
          </div>

          <!-- Website -->
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="url"
                class="form-control"
                id="website"
                formControlName="website"
                placeholder="Website">
              <label for="website">Website</label>
            </div>
          </div>
        </div>
      </app-form-section>

      <!-- Default Settings -->
      <app-form-section [title]="'Default Settings'" variant="modern">
        <div class="row g-3">
          <!-- Timezone -->
          <div class="col-md-4">
            <div class="form-floating">
              <select
                class="form-select"
                id="defaultTimezone"
                formControlName="defaultTimezone"
                [class.is-invalid]="hasError('defaultTimezone')">
                @for (tz of timezones; track tz) {
                  <option [value]="tz">{{ tz }}</option>
                }
              </select>
              <label for="defaultTimezone">
                Timezone
                <span class="text-danger">*</span>
              </label>
            </div>
          </div>

          <!-- Language -->
          <div class="col-md-4">
            <div class="form-floating">
              <select
                class="form-select"
                id="defaultLanguage"
                formControlName="defaultLanguage"
                [class.is-invalid]="hasError('defaultLanguage')">
                @for (lang of languages; track lang.code) {
                  <option [value]="lang.code">{{ lang.label }}</option>
                }
              </select>
              <label for="defaultLanguage">
                Language
                <span class="text-danger">*</span>
              </label>
            </div>
          </div>

          <!-- Currency -->
          <div class="col-md-4">
            <div class="form-floating">
              <select
                class="form-select"
                id="defaultCurrency"
                formControlName="defaultCurrency"
                [class.is-invalid]="hasError('defaultCurrency')">
                @for (cur of currencies; track cur.code) {
                  <option [value]="cur.code">{{ cur.label }}</option>
                }
              </select>
              <label for="defaultCurrency">
                Currency
                <span class="text-danger">*</span>
              </label>
            </div>
          </div>
        </div>
      </app-form-section>

      <!-- Form Actions -->
      <div class="app-form-actions">
        <button type="button" class="btn btn-secondary" [routerLink]="['/tenants', tenantId]">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          Save Changes
        </button>
      </div>
    </form>
  }
</div>
