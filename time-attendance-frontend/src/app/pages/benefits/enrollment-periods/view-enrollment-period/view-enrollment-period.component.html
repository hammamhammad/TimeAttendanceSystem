<div class="container-fluid app-modern-view">
  @if (loading()) { <app-loading-spinner></app-loading-spinner> }

  @if (!loading() && period()) {
    <app-form-header mode="view" [title]="t('benefits.periods.view')" [entityId]="entityId() ?? undefined" moduleName="benefits.periods" moduleRoute="benefits/enrollment-periods"></app-form-header>

    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant"></app-status-badge>
    </div>

    <div class="row">
      <div class="col-md-8 mb-4">
        <div class="card">
          <div class="card-header bg-light">
            <h6 class="mb-0"><i class="fas fa-info-circle me-2"></i>{{ t('common.details') }}</h6>
          </div>
          <div class="card-body">
            <app-definition-list [items]="infoItems()"></app-definition-list>
          </div>
        </div>
      </div>
    </div>

    <!-- Audit History -->
    <app-section-card [title]="t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
      <app-audit-history [entityName]="'OpenEnrollmentPeriod'" [entityId]="entityId()" />
    </app-section-card>

    <!-- Action Buttons -->
    <div class="d-flex gap-2 mt-3">
      @if (canOpen()) {
        <button class="btn btn-success" (click)="onOpen()"><i class="fas fa-door-open me-1"></i> {{ t('benefits.periods.open_action') }}</button>
      }
      @if (canClose()) {
        <button class="btn btn-warning" (click)="onClose()"><i class="fas fa-door-closed me-1"></i> {{ t('benefits.periods.close_action') }}</button>
      }
      @if (canEdit()) {
        <button class="btn btn-primary" (click)="onEdit()"><i class="fas fa-edit me-1"></i> {{ t('common.edit') }}</button>
      }
    </div>
  }
</div>
