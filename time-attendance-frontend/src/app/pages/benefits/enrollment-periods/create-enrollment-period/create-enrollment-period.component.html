<div class="container-fluid app-modern-form">
  <app-form-header
    [mode]="isEdit() ? 'edit' : 'create'"
    [title]="isEdit() ? t('benefits.periods.edit') : t('benefits.periods.create')"
    moduleName="benefits.periods"
    moduleRoute="benefits/enrollment-periods">
  </app-form-header>

  <form (ngSubmit)="onSubmit()">
    <app-form-section [title]="t('benefits.periods.basic_info')" variant="modern">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input type="text" class="form-control" id="name" [(ngModel)]="form.name" name="name" placeholder="x" required>
            <label for="name">{{ t('common.name') }} *</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="text" class="form-control" id="nameAr" [(ngModel)]="form.nameAr" name="nameAr" placeholder="x">
            <label for="nameAr">{{ t('common.name_ar') }}</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="planYear" [(ngModel)]="form.planYear" name="planYear" placeholder="x" required>
            <label for="planYear">{{ t('benefits.periods.plan_year') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="date" class="form-control" id="startDate" [(ngModel)]="form.startDate" name="startDate" placeholder="x" required>
            <label for="startDate">{{ t('benefits.periods.start_date') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="date" class="form-control" id="endDate" [(ngModel)]="form.endDate" name="endDate" placeholder="x" required>
            <label for="endDate">{{ t('benefits.periods.end_date') }} *</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <textarea class="form-control" id="notes" [(ngModel)]="form.notes" name="notes" placeholder="x" style="height: 80px"></textarea>
            <label for="notes">{{ t('common.notes') }}</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="allowLifeEventChanges" [(ngModel)]="form.allowLifeEventChanges" name="allowLifeEventChanges">
            <label class="form-check-label" for="allowLifeEventChanges">{{ t('benefits.periods.allow_life_events') }}</label>
          </div>
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="isActive" [(ngModel)]="form.isActive" name="isActive">
            <label class="form-check-label" for="isActive">{{ t('common.active') }}</label>
          </div>
        </div>
      </div>
    </app-form-section>

    <div class="app-form-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">{{ t('common.cancel') }}</button>
      <button type="submit" class="btn btn-primary" [disabled]="submitting()">
        @if (submitting()) { <span class="spinner-border spinner-border-sm me-1"></span> }
        {{ isEdit() ? t('common.save_changes') : t('common.create') }}
      </button>
    </div>
  </form>
</div>
