<div class="container-fluid app-modern-view">
  @if (loading()) { <app-loading-spinner></app-loading-spinner> }

  @if (!loading() && claim()) {
    <app-form-header mode="view" [title]="t('benefits.claims.view')" [entityId]="entityId() ?? undefined" moduleName="benefits.claims" moduleRoute="benefits/claims"></app-form-header>

    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant"></app-status-badge>
    </div>

    <div class="row">
      <div class="col-md-8 mb-4">
        <div class="card">
          <div class="card-header bg-light"><h6 class="mb-0"><i class="fas fa-file-invoice-dollar me-2"></i>{{ t('benefits.claims.claim_info') }}</h6></div>
          <div class="card-body"><app-definition-list [items]="claimInfoItems()"></app-definition-list></div>
        </div>
      </div>
    </div>

    <!-- Audit History -->
    <app-section-card [title]="t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
      <app-audit-history [entityName]="'BenefitClaim'" [entityId]="entityId()" />
    </app-section-card>

    <!-- Action Buttons -->
    @if (canApprove() || canReject() || canProcess()) {
      <div class="card mt-3">
        <div class="card-body">
          @if (canApprove() || canReject()) {
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label">{{ t('benefits.claims.approved_amount') }}</label>
                <input type="number" class="form-control" [ngModel]="approvedAmount()" (ngModelChange)="approvedAmount.set($event)" step="0.01">
              </div>
              <div class="col-md-4">
                <label class="form-label">{{ t('benefits.claims.rejection_reason') }}</label>
                <input type="text" class="form-control" [ngModel]="rejectionReason()" (ngModelChange)="rejectionReason.set($event)">
              </div>
            </div>
          }
          <div class="d-flex gap-2">
            @if (canApprove()) {
              <button class="btn btn-success" (click)="onApprove()"><i class="fas fa-check me-1"></i> {{ t('common.approve') }}</button>
            }
            @if (canReject()) {
              <button class="btn btn-danger" (click)="onReject()"><i class="fas fa-times me-1"></i> {{ t('common.reject') }}</button>
            }
            @if (canProcess()) {
              <button class="btn btn-success" (click)="onProcessPayment()"><i class="fas fa-money-bill me-1"></i> {{ t('benefits.claims.process_payment') }}</button>
            }
          </div>
        </div>
      </div>
    }
  }
</div>
