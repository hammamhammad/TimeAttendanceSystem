<div class="container-fluid">
  <app-page-header [title]="t('benefits.plans.title')" />

  <app-unified-filter
    [searchPlaceholder]="t('benefits.plans.search_placeholder')"
    [showAddButton]="permissionService.has(PERMISSIONS.CREATE)"
    [addButtonText]="t('benefits.plans.create')"
    [showRefreshButton]="true"
    [refreshButtonText]="t('common.refresh')"
    [refreshing]="loading()"
    (searchChange)="onSearchChange($event)"
    (add)="navigateToCreate()"
    (refresh)="onRefreshData()">
  </app-unified-filter>

  <app-data-table
    [columns]="tableColumns()"
    [data]="tableData() || []"
    [actions]="tableActions()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [totalItems]="totalCount()"
    [totalPages]="totalPages()"
    [loading]="loading"
    [emptyTitle]="t('benefits.plans.no_records_title')"
    [emptyMessage]="t('benefits.plans.no_records')"
    (actionClick)="onActionClick($event)"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)">
  </app-data-table>
</div>
