<div class="app-list-page">
  <app-page-header [title]="i18n.t('timesheets.timesheets.title')" />
  <app-unified-filter [searchPlaceholder]="i18n.t('timesheets.timesheets.search')" [showAddButton]="false"
    [showRefreshButton]="true" [refreshing]="loading()"
    (searchChange)="onSearchChange($event)" (refresh)="onRefreshData()" />

  <app-data-table [data]="tableData()" [columns]="columns" [actions]="tableActions()" [currentPage]="currentPage()"
    [totalPages]="totalPages()" [totalItems]="totalCount()" [pageSize]="pageSize()" [loading]="loading"
    [emptyTitle]="i18n.t('timesheets.timesheets.no_data')" [showPagination]="true"
    (actionClick)="onActionClick($event)" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
  </app-data-table>
</div>
