<div class="container-fluid app-modern-view">
  <app-form-header [title]="i18n.t('timesheets.projects.view')" moduleName="projects" moduleRoute="timesheets/projects" [loading]="loading()" />

  @if (loading()) { <app-loading-spinner [message]="i18n.t('common.loading')" [centered]="true" /> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }
  @if (project() && !loading()) {
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">{{ project()?.name }}</h5>
            <div class="d-flex gap-2">
              <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
              <app-status-badge [status]="activeBadge().label" [variant]="activeBadge().variant" />
            </div>
          </div>
          <div class="card-body">
            <app-definition-list [items]="detailItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">{{ i18n.t('common.actions') }}</h5></div>
          <div class="card-body d-grid gap-2">
            <button class="btn btn-primary" (click)="router.navigate(['/timesheets/projects', project()?.id, 'edit'])">
              <i class="fas fa-edit me-1"></i>{{ i18n.t('common.edit') }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tasks Tab -->
    <app-section-card [title]="i18n.t('timesheets.tasks.title')" icon="fas fa-tasks" headerClass="bg-light">
      <div class="mb-3 text-end">
        <button class="btn btn-sm btn-primary" (click)="openAddTask()">
          <i class="fas fa-plus me-1"></i>{{ i18n.t('timesheets.tasks.add') }}
        </button>
      </div>
      <app-data-table [data]="taskTableData()" [columns]="taskColumns" [actions]="taskActions()" [loading]="tasksLoading"
        [emptyTitle]="i18n.t('timesheets.tasks.no_data')" [paginated]="false"
        (actionClick)="onTaskAction($event)">
      </app-data-table>
    </app-section-card>

    <!-- Audit History -->
    <div class="row mt-3">
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'Project'" [entityId]="project()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>

<!-- Task Modal -->
@if (showTaskModal()) {
  <app-modal-wrapper [title]="editingTaskId() ? i18n.t('timesheets.tasks.edit') : i18n.t('timesheets.tasks.add')" [show]="showTaskModal()" (close)="showTaskModal.set(false)" size="lg">
    <div class="app-modern-form">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="form-floating">
            <input type="text" class="form-control" id="taskCode" placeholder="Code" [ngModel]="taskForm().code" (ngModelChange)="updateTaskField('code', $event)">
            <label for="taskCode">{{ i18n.t('timesheets.tasks.code') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="text" class="form-control" id="taskName" placeholder="Name" [ngModel]="taskForm().name" (ngModelChange)="updateTaskField('name', $event)">
            <label for="taskName">{{ i18n.t('timesheets.tasks.name') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="text" class="form-control" id="taskNameAr" placeholder="Name Ar" [ngModel]="taskForm().nameAr" (ngModelChange)="updateTaskField('nameAr', $event)">
            <label for="taskNameAr">{{ i18n.t('timesheets.tasks.name_ar') }}</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="taskBudget" placeholder="Budget" [ngModel]="taskForm().budgetHours" (ngModelChange)="updateTaskField('budgetHours', $event)">
            <label for="taskBudget">{{ i18n.t('timesheets.tasks.budget_hours') }}</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="taskOrder" placeholder="Order" [ngModel]="taskForm().displayOrder" (ngModelChange)="updateTaskField('displayOrder', $event)">
            <label for="taskOrder">{{ i18n.t('timesheets.tasks.display_order') }}</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-check form-switch mt-3">
            <input class="form-check-input" type="checkbox" id="taskActive" [ngModel]="taskForm().isActive" (ngModelChange)="updateTaskField('isActive', $event)">
            <label class="form-check-label" for="taskActive">{{ i18n.t('common.active') }}</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <textarea class="form-control" id="taskDesc" placeholder="Desc" style="height: 80px" [ngModel]="taskForm().description" (ngModelChange)="updateTaskField('description', $event)"></textarea>
            <label for="taskDesc">{{ i18n.t('common.description') }}</label>
          </div>
        </div>
      </div>
      <div class="app-form-actions mt-3">
        <button class="btn btn-secondary" (click)="showTaskModal.set(false)">{{ i18n.t('common.cancel') }}</button>
        <button class="btn btn-primary" (click)="saveTask()" [disabled]="taskSaving()">{{ i18n.t('common.save') }}</button>
      </div>
    </div>
  </app-modal-wrapper>
}
