<div class="container-fluid app-modern-view">
  <app-form-header [title]="i18n.t('timesheets.periods.view')" moduleName="periods" moduleRoute="timesheets/periods" [loading]="loading()" />

  @if (loading()) { <app-loading-spinner [message]="i18n.t('common.loading')" [centered]="true" /> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }
  @if (period() && !loading()) {
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">{{ period()?.name }}</h5>
            <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
          </div>
          <div class="card-body">
            <app-definition-list [items]="detailItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">{{ i18n.t('common.actions') }}</h5></div>
          <div class="card-body d-grid gap-2">
            @if (period()?.status !== 'Locked') {
              <button class="btn btn-primary" (click)="router.navigate(['/timesheets/periods', period()?.id, 'edit'])">
                <i class="fas fa-edit me-1"></i>{{ i18n.t('common.edit') }}
              </button>
            }
            @if (period()?.status === 'Open') {
              <button class="btn btn-warning" (click)="closePeriod()">
                <i class="fas fa-lock me-1"></i>{{ i18n.t('timesheets.periods.close') }}
              </button>
            }
            @if (period()?.status === 'Closed') {
              <button class="btn btn-danger" (click)="lockPeriod()">
                <i class="fas fa-ban me-1"></i>{{ i18n.t('timesheets.periods.lock') }}
              </button>
            }
          </div>
        </div>
      </div>
    </div>

    <!-- Timesheets in Period -->
    <app-section-card [title]="i18n.t('timesheets.timesheets.title')" icon="fas fa-clock" headerClass="bg-light">
      <app-data-table [data]="tsTableData()" [columns]="tsColumns" [actions]="tsActions()" [loading]="tsLoading"
        [emptyTitle]="i18n.t('timesheets.timesheets.no_data')" [paginated]="false"
        (actionClick)="onTsAction($event)">
      </app-data-table>
    </app-section-card>

    <!-- Audit History -->
    <div class="row mt-3">
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'TimesheetPeriod'" [entityId]="period()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>
