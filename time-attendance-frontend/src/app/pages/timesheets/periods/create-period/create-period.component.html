<div class="container-fluid app-modern-form">
  <app-form-header [title]="isEdit() ? i18n.t('timesheets.periods.edit') : i18n.t('timesheets.periods.create')"
    moduleName="periods" moduleRoute="timesheets/periods" [loading]="saving()" />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-form-section [title]="i18n.t('timesheets.periods.basic_info')" variant="modern">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input type="text" class="form-control" id="name" formControlName="name" placeholder="Name">
            <label for="name">{{ i18n.t('timesheets.periods.name') }} *</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <select class="form-select" id="branchId" formControlName="branchId">
              <option [ngValue]="null">{{ i18n.t('common.select') }}</option>
              @for (b of branches(); track b.id) { <option [ngValue]="b.id">{{ b.name }}</option> }
            </select>
            <label for="branchId">{{ i18n.t('timesheets.periods.branch') }} *</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <select class="form-select" id="periodType" formControlName="periodType">
              <option value="Weekly">{{ i18n.t('timesheets.periods.type_weekly') }}</option>
              <option value="BiWeekly">{{ i18n.t('timesheets.periods.type_biweekly') }}</option>
              <option value="Monthly">{{ i18n.t('timesheets.periods.type_monthly') }}</option>
            </select>
            <label for="periodType">{{ i18n.t('timesheets.periods.period_type') }} *</label>
          </div>
        </div>
        @if (isEdit()) {
          <div class="col-md-6">
            <div class="form-check form-switch mt-3">
              <input class="form-check-input" type="checkbox" id="isActive" formControlName="isActive">
              <label class="form-check-label" for="isActive">{{ i18n.t('common.active') }}</label>
            </div>
          </div>
        }
      </div>
    </app-form-section>

    <app-form-section [title]="i18n.t('timesheets.periods.dates')" variant="modern">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="form-floating">
            <input type="date" class="form-control" id="startDate" formControlName="startDate" placeholder="Start">
            <label for="startDate">{{ i18n.t('timesheets.periods.start_date') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="date" class="form-control" id="endDate" formControlName="endDate" placeholder="End">
            <label for="endDate">{{ i18n.t('timesheets.periods.end_date') }} *</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="date" class="form-control" id="submissionDeadline" formControlName="submissionDeadline" placeholder="Deadline">
            <label for="submissionDeadline">{{ i18n.t('timesheets.periods.submission_deadline') }} *</label>
          </div>
        </div>
      </div>
    </app-form-section>

    <div class="app-form-actions">
      <button type="button" class="btn btn-secondary" (click)="router.navigate(['/timesheets/periods'])">{{ i18n.t('common.cancel') }}</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">{{ i18n.t('common.save') }}</button>
    </div>
  </form>
</div>
