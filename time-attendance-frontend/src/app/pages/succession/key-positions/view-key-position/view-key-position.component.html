<div class="container-fluid app-modern-view">
  <app-form-header mode="view" [title]="i18n.t('succession.key_positions.view')" moduleName="key_positions" moduleRoute="succession/key-positions" [entityId]="item()?.id" [loading]="loading()" [actions]="headerActions()" />
  @if (loading()) { <div class="text-center py-5"><app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true" /></div> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }
  @if (item() && !loading()) {
    <div class="row g-4">
      <div class="col-12">
        <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
          <span class="fw-medium">{{ i18n.t('fields.status') }}:</span><app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
          <span class="fw-medium ms-3">{{ i18n.t('succession.key_positions.criticality') }}:</span><app-status-badge [status]="criticalityBadge().label" [variant]="criticalityBadge().variant" />
          <span class="fw-medium ms-3">{{ i18n.t('succession.key_positions.vacancy_risk') }}:</span><app-status-badge [status]="vacancyRiskBadge().label" [variant]="vacancyRiskBadge().variant" />
        </div>
      </div>
      <div class="col-lg-6"><app-section-card [title]="i18n.t('common.basic_info')"><app-definition-list [items]="infoItems()" [labelWidth]="'5'" [valueWidth]="'7'" /></app-section-card></div>
      <div class="col-lg-6"><app-section-card [title]="i18n.t('common.details')"><app-definition-list [items]="detailItems()" [labelWidth]="'5'" [valueWidth]="'7'" /></app-section-card></div>
      <div class="col-12"><app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light"><app-audit-history [entityName]="'KeyPosition'" [entityId]="item()?.id" /></app-section-card></div>
    </div>
  }
</div>
