<div class="container-fluid app-modern-view">
  <app-form-header mode="view" [title]="i18n.t('job_requisitions.view')" moduleName="job_requisitions" moduleRoute="recruitment/requisitions" [entityId]="item()?.id" [loading]="loading()" [actions]="headerActions()" />

  @if (loading()) { <div class="text-center py-5"><app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true" /></div> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }

  @if (item() && !loading()) {
    <div class="row g-4">
      <div class="col-12">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="fw-medium">{{ i18n.t('fields.status') }}:</span>
          <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
        </div>
      </div>
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('common.basic_info')">
          <app-definition-list [items]="basicInfoItems()" [labelWidth]="'5'" [valueWidth]="'7'" />
        </app-section-card>
      </div>
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('job_requisitions.salary_range')">
          <app-definition-list [items]="salaryItems()" [labelWidth]="'5'" [valueWidth]="'7'" />
        </app-section-card>
      </div>
      @if (item()?.description) {
        <div class="col-12">
          <app-section-card [title]="i18n.t('job_requisitions.description')">
            <p class="mb-0" style="white-space: pre-wrap;">{{ item()?.description }}</p>
          </app-section-card>
        </div>
      }
      @if (item()?.requirements) {
        <div class="col-12">
          <app-section-card [title]="i18n.t('job_requisitions.requirements')">
            <p class="mb-0" style="white-space: pre-wrap;">{{ item()?.requirements }}</p>
          </app-section-card>
        </div>
      }
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'JobRequisition'" [entityId]="item()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>
