<div class="app-list-page">
  <app-page-header [title]="i18n.t('department.departments')"></app-page-header>

  <app-unified-filter
    moduleName="departments"
    [refreshing]="loading()"
    (searchChange)="onSearchChange($event)"
    (filtersChange)="onFiltersChange($event)"
    (add)="onAddDepartment()"
    (refresh)="onRefreshData()">
  </app-unified-filter>

  <app-department-table
    [departments]="departments()"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [totalItems]="totalCount"
    [pageSize]="pageSize"
    (viewDepartment)="onDepartmentView($event)"
    (editDepartment)="onDepartmentEdit($event)"
    (deleteDepartment)="onDepartmentDelete($event)"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (selectionChange)="onSelectionChange($event)"
    (sortChange)="onSortChange($event)">
  </app-department-table>
</div>
