<div class="app-view-page app-modern-view">
  <app-form-header
    mode="view"
    [title]="i18n.t('feedback_360.view')"
    moduleName="feedback_360"
    moduleRoute="performance/feedback-requests"
    [entityId]="request()?.id"
    [loading]="loading()">
  </app-form-header>

  @if (loading()) {
    <div class="text-center py-5">
      <app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true"></app-loading-spinner>
    </div>
  }

  @if (request() && !loading()) {
    <!-- Status Badge -->
    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant"></app-status-badge>
    </div>

    <!-- Request Details -->
    <app-section-card [title]="i18n.t('feedback_360.view')" icon="fas fa-comments" headerClass="bg-light">
      <app-definition-list [items]="detailItems()" [labelWidth]="'4'" [valueWidth]="'8'"></app-definition-list>
    </app-section-card>

    <!-- Submit Feedback Form (only for Requested status) -->
    @if (isRequested()) {
      <app-section-card [title]="i18n.t('feedback_360.response_details')" icon="fas fa-edit" headerClass="bg-light" class="mt-4">
        <div class="row g-3">
          <div class="col-md-12">
            <div class="form-floating">
              <textarea class="form-control" id="ratings" [(ngModel)]="responseForm.ratings" placeholder="Ratings" style="height: 80px"></textarea>
              <label for="ratings">{{ i18n.t('feedback_360.ratings') }}</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating">
              <textarea class="form-control" id="strengths" [(ngModel)]="responseForm.strengths" placeholder="Strengths" style="height: 80px"></textarea>
              <label for="strengths">{{ i18n.t('feedback_360.strengths') }}</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating">
              <textarea class="form-control" id="areasForImprovement" [(ngModel)]="responseForm.areasForImprovement" placeholder="Areas" style="height: 80px"></textarea>
              <label for="areasForImprovement">{{ i18n.t('feedback_360.areas_for_improvement') }}</label>
            </div>
          </div>
          <div class="col-md-12">
            <div class="form-floating">
              <textarea class="form-control" id="additionalComments" [(ngModel)]="responseForm.additionalComments" placeholder="Comments" style="height: 80px"></textarea>
              <label for="additionalComments">{{ i18n.t('feedback_360.additional_comments') }}</label>
            </div>
          </div>
          <div class="col-md-12">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="isAnonymous" [(ngModel)]="responseForm.isAnonymous">
              <label class="form-check-label" for="isAnonymous">{{ i18n.t('feedback_360.is_anonymous') }}</label>
            </div>
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-primary" (click)="submitFeedback()" [disabled]="processing()">
            @if (processing()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            <i class="fa-solid fa-paper-plane me-2"></i>{{ i18n.t('feedback_360.submit') }}
          </button>
          <button class="btn btn-outline-danger" (click)="declineRequest()" [disabled]="processing()">
            <i class="fa-solid fa-times me-2"></i>{{ i18n.t('feedback_360.decline') }}
          </button>
        </div>
      </app-section-card>
    }

    <!-- Status message for non-Requested -->
    @if (!isRequested()) {
      <app-section-card [title]="i18n.t('feedback_360.response_details')" icon="fas fa-info-circle" headerClass="bg-light" class="mt-4">
        <div class="text-center text-muted py-4">
          <i class="fa-solid fa-check-circle me-2"></i>{{ i18n.t('feedback_360.status_' + request()!.status) }}
        </div>
      </app-section-card>
    }
  }
</div>
