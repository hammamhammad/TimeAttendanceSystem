<div class="container-fluid app-modern-view">
  <app-form-header mode="view" [title]="i18n.t('goals.view')" moduleName="goals" moduleRoute="performance/goals" [entityId]="item()?.id" [loading]="loading()" [actions]="headerActions()" />
  @if (loading()) { <div class="text-center py-5"><app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true" /></div> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }
  @if (item() && !loading()) {
    <div class="row g-4">
      <div class="col-12"><div class="d-flex align-items-center gap-2 mb-3"><span class="fw-medium">{{ i18n.t('fields.status') }}:</span><app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" /></div></div>
      <div class="col-lg-6"><app-section-card [title]="i18n.t('common.basic_info')"><app-definition-list [items]="infoItems()" [labelWidth]="'5'" [valueWidth]="'7'" /></app-section-card></div>
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('goals.progress')">
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
              <span class="fw-medium">{{ i18n.t('goals.progress') }}</span>
              <span class="fw-bold">{{ item()!.progressPercentage }}%</span>
            </div>
            <div class="progress" style="height: 24px;">
              <div class="progress-bar" [class.bg-success]="item()!.progressPercentage === 100" [class.bg-info]="item()!.progressPercentage < 100" [style.width.%]="item()!.progressPercentage">{{ item()!.progressPercentage }}%</div>
            </div>
          </div>
        </app-section-card>
      </div>
      @if (item()?.description) { <div class="col-12"><app-section-card [title]="i18n.t('goals.description')"><p class="mb-0" style="white-space: pre-wrap;">{{ item()?.description }}</p></app-section-card></div> }

      <!-- Progress Update Form -->
      @if (showProgressForm()) {
        <div class="col-12">
          <app-section-card [title]="i18n.t('goals.update_progress')">
            <form [formGroup]="progressForm" (ngSubmit)="submitProgress()" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-medium">{{ i18n.t('goals.current_value') }} <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" formControlName="currentValue">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-medium">{{ i18n.t('goals.progress') }} (%) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" formControlName="progressPercentage" min="0" max="100">
                </div>
                <div class="col-12 d-flex gap-2">
                  <button type="submit" class="btn btn-primary" [disabled]="progressForm.invalid || submittingProgress()">
                    @if (submittingProgress()) { <span class="spinner-border spinner-border-sm me-1"></span> }{{ i18n.t('common.submit') }}
                  </button>
                  <button type="button" class="btn btn-secondary" (click)="showProgressForm.set(false)">{{ i18n.t('common.cancel') }}</button>
                </div>
              </div>
            </form>
          </app-section-card>
        </div>
      }

      <div class="col-12"><app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light"><app-audit-history [entityName]="'GoalDefinition'" [entityId]="item()?.id" /></app-section-card></div>
    </div>
  }
</div>
