<div class="work-queue-page">
  <header class="page-header">
    <h1>{{ queueTitles[queueType()] ?? queueType() }}</h1>
    <p class="subtitle">{{ queueDescriptions[queueType()] ?? '' }}</p>
    <div class="actions">
      <label>
        Limit:
        <select [ngModel]="limit()" (ngModelChange)="onLimitChange(+$event)">
          <option [ngValue]="50">50</option>
          <option [ngValue]="100">100</option>
          <option [ngValue]="250">250</option>
          <option [ngValue]="500">500</option>
        </select>
      </label>
      <button type="button" (click)="reload()" [disabled]="loading()">
        {{ loading() ? 'Refreshing…' : 'Refresh' }}
      </button>
      <a routerLink="/ops-dashboard" class="back-link">← Dashboard</a>
    </div>
  </header>

  <div *ngIf="error()" class="error-banner">{{ error() }}</div>

  <table class="queue-table" *ngIf="rows().length > 0; else emptyState">
    <thead>
      <tr>
        <th *ngFor="let col of columns()">{{ col }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows()">
        <td *ngFor="let col of columns()">{{ formatCell(row[col]) }}</td>
      </tr>
    </tbody>
  </table>

  <ng-template #emptyState>
    <p class="empty-state" *ngIf="!loading()">Nothing in this queue 🎉</p>
    <p class="empty-state" *ngIf="loading()">Loading…</p>
  </ng-template>

  <footer class="result-count" *ngIf="rows().length > 0">
    Showing {{ rows().length }} rows (limit {{ limit() }}).
  </footer>
</div>
