<div class="container-fluid app-modern-view">
  <app-form-header [title]="i18n.t('salary_advances.view')" moduleName="salary-advances" moduleRoute="loans/salary-advances" [loading]="loading()" />

  @if (loading()) { <app-loading-spinner [message]="i18n.t('common.loading')" [centered]="true" /> }
  @if (error()) { <div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}</div> }
  @if (advance() && !loading()) {
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">{{ i18n.t('salary_advances.advance_details') }}</h5>
            <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
          </div>
          <div class="card-body">
            <app-definition-list [items]="detailItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        @if (advance()?.status === 'Pending') {
          <div class="card mb-3">
            <div class="card-header"><h5 class="card-title mb-0">{{ i18n.t('common.actions') }}</h5></div>
            <div class="card-body d-grid gap-2">
              <button class="btn btn-success" (click)="approve()" [disabled]="processing()">
                @if (processing()) { <span class="spinner-border spinner-border-sm me-1"></span> }
                <i class="fas fa-check me-1"></i>{{ i18n.t('common.approve') }}
              </button>
              <button class="btn btn-danger" (click)="reject()" [disabled]="processing()">
                @if (processing()) { <span class="spinner-border spinner-border-sm me-1"></span> }
                <i class="fas fa-times me-1"></i>{{ i18n.t('common.reject') }}
              </button>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Audit History -->
    <div class="row mt-3">
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'SalaryAdvance'" [entityId]="advance()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>
