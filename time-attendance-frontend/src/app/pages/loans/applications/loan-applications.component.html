<div class="app-list-page">
  <app-page-header [title]="i18n.t('loan_applications.title')" />
  <app-unified-filter [searchPlaceholder]="i18n.t('loan_applications.search')" [showAddButton]="true"
    [addButtonText]="i18n.t('loan_applications.create')" [showRefreshButton]="true" [refreshing]="loading()"
    (searchChange)="onSearchChange($event)" (add)="navigateToCreate()" (refresh)="onRefreshData()" />

  <app-data-table [data]="data()" [columns]="columns" [actions]="tableActions()" [currentPage]="currentPage()"
    [totalPages]="totalPages()" [totalItems]="totalCount()" [pageSize]="pageSize()" [loading]="loading"
    [emptyTitle]="i18n.t('loan_applications.no_data')" [showPagination]="true"
    (actionClick)="onActionClick($event)" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
    <ng-template #cellTemplate let-item let-column="column">
      @if (column.key === 'status') {
        <span class="badge" [class.bg-secondary]="item.status === 'Draft'" [class.bg-primary]="item.status === 'Submitted'"
          [class.bg-info]="item.status === 'UnderReview' || item.status === 'Disbursed' || item.status === 'Repaying'"
          [class.bg-success]="item.status === 'Approved' || item.status === 'Completed'"
          [class.bg-danger]="item.status === 'Rejected'" [class.bg-warning]="item.status === 'Cancelled'">
          {{ i18n.t('loan_applications.status_' + item.status) }}
        </span>
      } @else if (column.key === 'requestedAmount') { {{ item.requestedAmount.toFixed(2) }}
      } @else { {{ item[column.key] ?? '-' }} }
    </ng-template>
  </app-data-table>
</div>
