<div class="app-modern-view">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-secondary me-3" (click)="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h4 class="mb-0">{{ i18n.t('onCall.view') }}</h4>
    </div>
    @if (schedule()) {
      <div class="d-flex gap-2">
        <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
        <button class="btn btn-primary btn-sm" (click)="goToEdit()">
          <i class="fa-solid fa-edit me-1"></i> {{ i18n.t('common.edit') }}
        </button>
      </div>
    }
  </div>

  @if (loading()) {
    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  } @else if (schedule()) {
    <div class="card">
      <div class="card-header"><h5 class="mb-0">{{ i18n.t('common.details') }}</h5></div>
      <div class="card-body">
        <app-definition-list [items]="infoItems()" labelWidth="4" valueWidth="8" />
      </div>
    </div>
  }
</div>
