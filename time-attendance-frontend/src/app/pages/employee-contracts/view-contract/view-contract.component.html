<div class="container-fluid app-modern-view">
  <app-form-header
    mode="view"
    [title]="i18n.t('employee_contracts.view_contract')"
    moduleName="employee_contracts"
    moduleRoute="employee-contracts"
    [entityId]="item()?.id"
    [loading]="loading()"
    [actions]="headerActions()">
  </app-form-header>

  @if (loading()) {
    <div class="text-center py-5">
      <app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true" />
    </div>
  }

  @if (error()) {
    <div class="alert alert-danger" role="alert">
      <i class="fas fa-exclamation-triangle me-2"></i>
      {{ error() }}
    </div>
  }

  @if (item() && !loading()) {
    <div class="row g-4">
      <!-- Status -->
      <div class="col-12">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="fw-medium">{{ i18n.t('fields.status') }}:</span>
          <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
        </div>
      </div>

      <!-- Basic Information -->
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('common.basic_info')">
          <app-definition-list [items]="basicInfoItems()" [labelWidth]="'5'" [valueWidth]="'7'" />
        </app-section-card>
      </div>

      <!-- Contract Details -->
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('employee_contracts.contract_details')">
          <app-definition-list [items]="contractDetailsItems()" [labelWidth]="'5'" [valueWidth]="'7'" />
        </app-section-card>
      </div>

      <!-- Terms -->
      @if (item()?.terms) {
        <div class="col-12">
          <app-section-card [title]="i18n.t('employee_contracts.terms')">
            <p class="mb-0" style="white-space: pre-wrap;">{{ item()?.terms }}</p>
          </app-section-card>
        </div>
      }

      <!-- Contract Document -->
      <div class="col-lg-6">
        <app-section-card [title]="i18n.t('files.upload_document')">
          <app-file-upload
            [label]="i18n.t('files.upload_document')"
            [category]="'contracts'"
            [accept]="'.pdf,.doc,.docx'"
            [currentFileUrl]="item()?.documentUrl"
            [entityType]="'EmployeeContract'"
            [entityId]="item()?.id"
            [fieldName]="'documentUrl'"
            (fileUploaded)="onDocumentUploaded($event)">
          </app-file-upload>
        </app-section-card>
      </div>

      <!-- Audit History -->
      <div class="col-12">
        <app-section-card [title]="i18n.t('history.title')" icon="fas fa-clock-rotate-left" headerClass="bg-light">
          <app-audit-history [entityName]="'EmployeeContract'" [entityId]="item()?.id" />
        </app-section-card>
      </div>
    </div>
  }
</div>
