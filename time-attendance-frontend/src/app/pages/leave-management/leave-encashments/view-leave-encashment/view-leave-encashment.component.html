<div class="container-fluid app-modern-view">
  @if (loading()) { <app-loading-spinner></app-loading-spinner> }

  @if (!loading() && item()) {
    <app-form-header mode="view" [title]="t('leave_encashments.view')" [entityId]="entityId() ?? undefined" moduleName="leave_encashments" moduleRoute="leave-management/leave-encashments"></app-form-header>

    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant"></app-status-badge>
    </div>

    <div class="row">
      <div class="col-md-8 mb-4">
        <div class="card">
          <div class="card-header bg-light"><h6 class="mb-0"><i class="fas fa-money-bill-wave me-2"></i>{{ t('leave_encashments.details') }}</h6></div>
          <div class="card-body"><app-definition-list [items]="detailItems()"></app-definition-list></div>
        </div>
      </div>
    </div>

    @if (canApprove() || canReject()) {
      <div class="card mt-3">
        <div class="card-body">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">{{ t('common.notes') }}</label>
              <input type="text" class="form-control" [ngModel]="rejectionNotes()" (ngModelChange)="rejectionNotes.set($event)">
            </div>
          </div>
          <div class="d-flex gap-2">
            @if (canApprove()) {
              <button class="btn btn-success" (click)="onApprove()"><i class="fas fa-check me-1"></i> {{ t('common.approve') }}</button>
            }
            @if (canReject()) {
              <button class="btn btn-danger" (click)="onReject()"><i class="fas fa-times me-1"></i> {{ t('common.reject') }}</button>
            }
          </div>
        </div>
      </div>
    }
  }
</div>
