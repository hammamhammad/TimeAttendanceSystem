<div class="container-fluid app-modern-view">
  @if (loading()) { <app-loading-spinner></app-loading-spinner> }

  @if (!loading() && item()) {
    <app-form-header mode="view" [title]="t('compensatory_offs.view')" [entityId]="entityId() ?? undefined" moduleName="compensatory_offs" moduleRoute="leave-management/compensatory-offs"></app-form-header>

    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant"></app-status-badge>
    </div>

    <div class="row">
      <div class="col-md-8 mb-4">
        <div class="card">
          <div class="card-header bg-light"><h6 class="mb-0"><i class="fas fa-calendar-check me-2"></i>{{ t('compensatory_offs.details') }}</h6></div>
          <div class="card-body"><app-definition-list [items]="detailItems()"></app-definition-list></div>
        </div>
      </div>
    </div>

    @if (canCancel()) {
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-danger" (click)="onCancel()"><i class="fas fa-ban me-1"></i> {{ t('common.cancel') }}</button>
      </div>
    }
  }
</div>
