<div class="container-fluid app-modern-view">
  <app-form-header
    [title]="i18n.t('job_grades.view')"
    moduleName="job_grades"
    moduleRoute="job-grades">
  </app-form-header>

  @if (loading()) {
    <div class="text-center py-5">
      <app-loading-spinner [message]="i18n.t('common.loading')" [variant]="'primary'" [centered]="true" />
    </div>
  }

  @if (!loading() && grade()) {
    <!-- Action Buttons -->
    <div class="d-flex justify-content-end gap-2 mb-3">
      <button class="btn btn-outline-primary btn-sm" (click)="editGrade()">
        <i class="fa-solid fa-edit me-1"></i>{{ i18n.t('common.edit') }}
      </button>
      <button class="btn btn-outline-warning btn-sm" (click)="toggleStatus()">
        <i class="fa-solid fa-toggle-on me-1"></i>{{ grade()!.isActive ? i18n.t('common.deactivate') : i18n.t('common.activate') }}
      </button>
      <button class="btn btn-outline-danger btn-sm" (click)="deleteGrade()">
        <i class="fa-solid fa-trash me-1"></i>{{ i18n.t('common.delete') }}
      </button>
    </div>

    <!-- Status -->
    <div class="mb-3">
      <app-status-badge [status]="statusBadge().label" [variant]="statusBadge().variant" />
    </div>

    <!-- Basic Information -->
    <div class="card mb-3">
      <div class="card-header">
        <h6 class="mb-0"><i class="fa-solid fa-info-circle me-2"></i>{{ i18n.t('common.basic_info') }}</h6>
      </div>
      <div class="card-body">
        <app-definition-list [items]="basicInfoItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
      </div>
    </div>

    <!-- Salary Range -->
    <div class="card mb-3">
      <div class="card-header">
        <h6 class="mb-0"><i class="fa-solid fa-money-bill me-2"></i>{{ i18n.t('job_grades.salary_range') }}</h6>
      </div>
      <div class="card-body">
        <app-definition-list [items]="salaryItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
      </div>
    </div>

    <!-- Audit Info -->
    <div class="card mb-3">
      <div class="card-header">
        <h6 class="mb-0"><i class="fa-solid fa-clock me-2"></i>{{ i18n.t('common.audit_info') }}</h6>
      </div>
      <div class="card-body">
        <app-definition-list [items]="auditItems()" [labelWidth]="'4'" [valueWidth]="'8'" />
      </div>
    </div>
  }
</div>
