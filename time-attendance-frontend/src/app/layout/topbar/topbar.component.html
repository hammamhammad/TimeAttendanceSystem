<header class="header-bar" [class.sidenav-collapsed]="sidenavCollapsed()">
  <!-- Breadcrumb (left) -->
  <div class="header-breadcrumb">
    @for (crumb of breadcrumb(); track $index; let last = $last) {
      @if (!last && crumb.url) {
        <a href="#" (click)="goCrumb(crumb, $event)">{{ crumb.label }}</a>
      } @else {
        <span class="current">{{ crumb.label }}</span>
      }
      @if (!last) {
        <i class="fa-solid separator" [class.fa-chevron-right]="!isRtl()" [class.fa-chevron-left]="isRtl()"></i>
      }
    }
  </div>

  <!-- Right: icons + user -->
  <div class="header-right">
    <!-- Search trigger + popover -->
    <div class="header-search-wrap">
      <button type="button"
              class="header-icon-btn"
              (click)="onToggleSearch(); $event.stopPropagation()"
              [attr.aria-label]="t('search.placeholder')"
              [attr.aria-expanded]="showSearch()"
              [title]="t('search.placeholder')">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      @if (showSearch()) {
        <div class="header-search-popover" (click)="$event.stopPropagation()">
          <form (ngSubmit)="onSearchSubmit()" role="search">
            <div class="search-inner">
              <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
              <input
                id="topbar-omnibox"
                type="search"
                class="search-input"
                [ngModel]="searchQuery()"
                (ngModelChange)="searchQuery.set($event)"
                name="q"
                autocomplete="off"
                [attr.placeholder]="t('search.placeholder')"
                [attr.aria-label]="t('search.placeholder')" />
              <kbd class="search-hint">Ctrl+K</kbd>
            </div>
          </form>
        </div>
      }
    </div>

    <!-- Notification bell -->
    <app-notification-bell></app-notification-bell>

    <!-- Language switch -->
    <button type="button"
            class="header-icon-btn"
            (click)="onSwitchLanguage()"
            [title]="currentLocale() === 'en' ? 'عربي' : 'English'"
            [attr.aria-label]="t('settings.language')">
      <i class="fa-solid fa-globe"></i>
    </button>

    <!-- User menu -->
    <div class="header-user-wrap" [class.open]="showUserMenu()">
      <button type="button"
              class="header-user"
              (click)="onToggleUserMenu(); $event.stopPropagation()"
              [attr.aria-expanded]="showUserMenu()">
        <span class="header-user-avatar">{{ userInitials() }}</span>
        <span class="header-user-name d-none d-md-inline">{{ currentUser()?.username }}</span>
        <i class="fa-solid fa-chevron-down d-none d-md-inline header-user-caret"></i>
      </button>

      @if (showUserMenu()) {
        <div class="header-user-menu" (click)="$event.stopPropagation()">
          <a class="header-user-menu-item" href="#" (click)="$event.preventDefault()">
            <i class="fa-solid fa-user"></i>
            <span>{{ t('settings.profile') }}</span>
          </a>
          <a class="header-user-menu-item" href="#" (click)="$event.preventDefault()">
            <i class="fa-solid fa-cog"></i>
            <span>{{ t('nav.settings') }}</span>
          </a>
          <div class="header-user-menu-divider"></div>
          <a class="header-user-menu-item danger" href="#" (click)="$event.preventDefault(); onLogout()">
            <i class="fa-solid fa-sign-out-alt"></i>
            <span>{{ t('nav.logout') }}</span>
          </a>
        </div>
      }
    </div>
  </div>
</header>
