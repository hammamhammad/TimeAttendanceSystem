<header class="topbar" [class.sidenav-collapsed]="sidenavCollapsed()">
  <div class="topbar-content">
    <!-- Left section: Menu toggle -->
    <div class="topbar-left">
      <button class="btn btn-link topbar-btn" 
              type="button"
              (click)="onToggleSidenav()"
              [attr.aria-label]="t('nav.toggle_menu')"
              [attr.aria-expanded]="!sidenavCollapsed()">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <!-- Center section: page title + omnibox global search -->
    <div class="topbar-center">
      <h1 class="page-title mb-0">{{ pageTitle() }}</h1>
    </div>

    <div class="topbar-omnibox-wrap">
      <form (ngSubmit)="onSearchSubmit()" role="search">
        <div class="omnibox-inner">
          <i class="fa-solid fa-magnifying-glass omnibox-icon" aria-hidden="true"></i>
          <input
            id="topbar-omnibox"
            type="search"
            class="form-control form-control-sm omnibox-input"
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)"
            (keydown.escape)="searchQuery.set(''); $event.preventDefault()"
            name="q"
            autocomplete="off"
            [attr.placeholder]="t('search.placeholder')"
            [attr.aria-label]="t('search.placeholder')" />
          <kbd class="omnibox-hint d-none d-md-inline">Ctrl+K</kbd>
        </div>
      </form>
    </div>

    <!-- Right section: User menu and language switch -->
    <div class="topbar-right">
      <!-- Notification bell -->
      <app-notification-bell></app-notification-bell>

      <!-- Language switch -->
      <button class="btn btn-link topbar-btn me-2"
              type="button"
              (click)="onSwitchLanguage()"
              [attr.aria-label]="t('settings.language')">
        <i class="fa-solid fa-globe"></i>
        <span class="d-none d-md-inline ms-1">
          {{ currentLocale() === 'en' ? 'عربي' : 'English' }}
        </span>
      </button>

      <!-- User menu -->
      <div class="dropdown" 
           [class.show]="showUserMenu()">
        <button class="btn btn-link topbar-btn dropdown-toggle" 
                type="button"
                (click)="onToggleUserMenu()"
                [attr.aria-expanded]="showUserMenu()">
          <i class="fa-solid fa-user me-1"></i>
          <span class="d-none d-md-inline">{{ currentUser()?.username }}</span>
        </button>
        
        @if (showUserMenu()) {
          <ul class="dropdown-menu dropdown-menu-end show">
            <li>
              <a class="dropdown-item" href="#" (click)="$event.preventDefault()">
                <i class="fa-solid fa-user me-2"></i>
                {{ t('settings.profile') }}
              </a>
            </li>
            <li>
              <a class="dropdown-item" href="#" (click)="$event.preventDefault()">
                <i class="fa-solid fa-cog me-2"></i>
                {{ t('nav.settings') }}
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" 
                 href="#" 
                 (click)="$event.preventDefault(); onLogout()">
                <i class="fa-solid fa-sign-out-alt me-2"></i>
                {{ t('nav.logout') }}
              </a>
            </li>
          </ul>
        }
      </div>
    </div>
  </div>
</header>

<!-- Backdrop for mobile menu -->
@if (showUserMenu()) {
  <div class="dropdown-backdrop" (click)="onClickOutside()"></div>
}
